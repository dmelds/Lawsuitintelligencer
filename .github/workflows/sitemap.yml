 name: Build sitemap

# Regenerates sitemap.xml whenever pages change on main, and on demand.
# The commit it makes is sitemap-only and tagged [skip ci]; combined with the
# paths filter below, that prevents the workflow from retriggering itself.

on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "scripts/generate_sitemap.py"
      - ".github/workflows/sitemap.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sitemap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so per-file git commit dates (lastmod) are accurate.
          fetch-depth: 0

      - name: Generate sitemap.xml
        run: python3 scripts/generate_sitemap.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain sitemap.xml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "chore: regenerate sitemap.xml [skip ci]"
            git push
            echo "sitemap.xml updated."
          else
            echo "sitemap.xml already up to date; nothing to commit."
          fi
